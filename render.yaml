services:
  - type: web
    name: brain-tumor-mri-api
    runtime: python
    plan: free
    branch: main
    rootDir: render_app/backend
    buildCommand: pip install --upgrade pip && pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: brain-tumor-mri-web
    runtime: static
    plan: free
    branch: main
    rootDir: render_app/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_HOST
        fromService:
          name: brain-tumor-mri-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

